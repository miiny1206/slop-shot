# project.yml — giống package.json: mô tả cách build app.
# Chạy `xcodegen generate` để sinh ra SlopShot.xcodeproj từ file này.
name: SlopShot

options:
  bundleIdPrefix: com.thanglb
  deploymentTarget:
    macOS: "15.0"           # 14+ cho ScreenCaptureKit; nâng 15 để xài API async mới (AVAssetExportSession.export(to:as:))
  createIntermediateGroups: true

targets:
  SlopShot:
    type: application
    platform: macOS
    sources:
      - path: Sources
    info:
      path: Support/Info.plist   # XcodeGen tự sinh file plist này
      properties:
        CFBundleDisplayName: SlopShot
        CFBundleShortVersionString: "0.1"
        LSMinimumSystemVersion: "15.0"
        LSUIElement: true        # app chạy nền: ẩn Dock + ẩn khỏi ⌘Tab
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.thanglb.slopshot
        MARKETING_VERSION: "0.1"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.0"        # dùng language mode 5 cho nhẹ đầu lúc học
        CODE_SIGN_IDENTITY: "-"     # ad-hoc sign: đủ để chạy local
        CODE_SIGNING_REQUIRED: NO
        ENABLE_HARDENED_RUNTIME: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon   # icon lấy từ Sources/Assets.xcassets/AppIcon
